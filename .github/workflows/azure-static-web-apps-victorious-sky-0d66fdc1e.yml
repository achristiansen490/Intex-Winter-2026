name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/INTEX II 3-10/package-lock.json
      - name: Install dependencies
        working-directory: Frontend/INTEX II 3-10
        run: npm ci
      # Bakes the backend URL into the JS bundle (see Frontend/.../src/lib/api.ts).
      # Set repository variable VITE_API_BASE_URL to your App Service URL (https://...azurewebsites.net)
      # if it differs from the default in api.ts, or leave unset to use that default.
      - name: Build frontend
        working-directory: Frontend/INTEX II 3-10
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build
      - name: Verify SPA hosting files in dist
        working-directory: Frontend/INTEX II 3-10
        run: |
          test -f dist/index.html
          test -f dist/staticwebapp.config.json
          test -f dist/_redirects
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_SKY_0D66FDC1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "Frontend/INTEX II 3-10/dist" # Prebuilt app artifact path
          api_location: "" # Api source code path - optional
          output_location: "" # Not needed when skip_app_build is true
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_SKY_0D66FDC1E }}
          action: "close"
