# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Hiraya-Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build Backend/HirayaHaven.Api/HirayaHaven.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish Backend/HirayaHaven.Api/HirayaHaven.Api.csproj -c Release -o "${{ runner.temp }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ runner.temp }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A57B805845E4435099CBB72CAF470320 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1164F17468B24704A83464CF511337F6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E7EB63029ACC41C28E46F6E189BBAE04 }}

      - name: Install EF Core CLI
        if: ${{ env.AZURE_SQL_CONNECTION_STRING != '' }}
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore backend project for migrations
        if: ${{ env.AZURE_SQL_CONNECTION_STRING != '' }}
        run: dotnet restore Backend/HirayaHaven.Api/HirayaHaven.Api.csproj

      - name: Build backend project for migrations
        if: ${{ env.AZURE_SQL_CONNECTION_STRING != '' }}
        run: dotnet build Backend/HirayaHaven.Api/HirayaHaven.Api.csproj --configuration Release --no-restore

      - name: Apply SQL Server migrations
        if: ${{ env.AZURE_SQL_CONNECTION_STRING != '' }}
        env:
          ConnectionStrings__AzureSqlConnection: ${{ env.AZURE_SQL_CONNECTION_STRING }}
          Database__Provider: sqlserver
        run: |
          dotnet ef database update \
            --project Backend/HirayaHaven.Api/HirayaHaven.Api.csproj \
            --startup-project Backend/HirayaHaven.Api/HirayaHaven.Api.csproj \
            --context HirayaSqlServerContext

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Hiraya-Backend'
          slot-name: 'Production'
          package: ./.net-app
          
